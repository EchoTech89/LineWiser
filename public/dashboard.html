<script>
    function initLineWiser() {
        const getLw = (n) => {
            let ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(n + "=") == 0) return decodeURIComponent(c.substring(n.length + 1));
            } return null;
        };

        // 1. Apply Theme
        const theme = getLw('lw-theme');
        const colors = {
            'blue': '#8ab4f8',
            'purple': '#a855f7',
            'emerald': '#10b981',
            'crimson': '#f43f5e',
            'amber': '#fbbf24'
        };
        if (theme && colors[theme]) {
            document.documentElement.style.setProperty('--accent-color', colors[theme]);
            document.documentElement.style.setProperty('--accent-shadow', colors[theme] + '66');
        }

        // 2. Apply Custom Background
        const bgUrl = getLw('lw-bg-url');
        const bgContainer = document.getElementById('sj-home') || document.body;
        if (bgUrl && bgContainer) {
            bgContainer.style.backgroundImage = `url('${bgUrl}')`;
            bgContainer.style.backgroundSize = 'cover';
            bgContainer.style.backgroundPosition = 'center';
        }

        // 3. Apply Engine
        const engine = getLw('lw-engine');
        const engineInput = document.getElementById('sj-search-engine');
        if (engine && engineInput) engineInput.value = engine;

        // 4. Panic Key
        const panic = getLw('lw-panic-key');
        if (panic) {
            window.addEventListener('keydown', (e) => {
                if (e.key === panic) window.location.replace('https://classroom.google.com');
            });
        }
    }
    document.addEventListener('DOMContentLoaded', initLineWiser);
</script>

 <script>
    // --- CONFIG ---
    const COOKIE_NAME = "lw_shortcuts";
    const shortcutsGrid = document.getElementById('shortcuts-container');
    const addBtn = document.getElementById('add-shortcut-btn');
    let brandClicks = 0;
    let brandTimer;

    // --- COOKIE HELPERS ---
    function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires=" + d.toUTCString() + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) {
                try { return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length))); }
                catch(e) { return null; }
            }
        }
        return null;
    }

    // --- SHORTCUTS LOGIC ---
    const defaultShortcuts = [
        { name: "Google", url: "https://google.com" },
        { name: "YouTube", url: "https://youtube.com" },
        { name: "GitHub", url: "https://github.com" }
    ];

    let userShortcuts = getCookie(COOKIE_NAME) || defaultShortcuts;

    function renderShortcuts() {
        if (!shortcutsGrid) return;
        shortcutsGrid.innerHTML = '';

        userShortcuts.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lw-shortcut';

            // We use a simple SPAN with "LW" instead of an <img> tag
            div.innerHTML = `
                <button class="lw-shortcut-del" title="Remove">&times;</button>
                <div class="lw-shortcut-icon">
                    <span style="color: #8ab4f8; font-weight: 700; font-size: 18px; user-select: none; font-family: var(--font-main);">LW</span>
                </div>
                <div class="lw-shortcut-label">${item.name}</div>
            `;

            // Click to open in proxy
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('lw-shortcut-del')) return;
                const input = document.getElementById("sj-address");
                if (input) {
                    input.value = item.url;
                    document.getElementById("sj-form").requestSubmit();
                }
            });

            // Delete logic
            div.querySelector('.lw-shortcut-del').addEventListener('click', (e) => {
                e.stopPropagation();
                userShortcuts.splice(index, 1);
                setCookie(COOKIE_NAME, userShortcuts, 365);
                renderShortcuts();
            });

            shortcutsGrid.appendChild(div);
        });
    }

    // --- GLOBAL EVENT LISTENERS ---
    document.addEventListener("click", (e) => {
        // Triple-Click Brand Logic
        const brand = e.target.closest(".lw-side-brand");
        if (brand) {
            brandClicks++;
            clearTimeout(brandTimer);
            brandTimer = setTimeout(() => { brandClicks = 0; }, 800);
            if (brandClicks === 3) {
                brandClicks = 0;
                const dummy = document.createElement("button");
                dummy.setAttribute("data-lw-tab-url", "/admin.html");
                document.body.appendChild(dummy);
                dummy.click();
                dummy.remove();
            }
            return;
        }

        // Quick Links Logic (data-lw-url buttons)
        const btn = e.target.closest("[data-lw-url]");
        if (btn) {
            const input = document.getElementById("sj-address");
            input.value = btn.getAttribute("data-lw-url");
            document.getElementById("sj-form").requestSubmit();
        }
    });

    // Add Shortcut Button
    addBtn.addEventListener('click', () => {
        const name = prompt("Shortcut Name:");
        if (!name) return;
        let url = prompt("URL (e.g. https://google.com):");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        userShortcuts.push({ name, url });
        setCookie(COOKIE_NAME, userShortcuts, 365);
        renderShortcuts();
    });

    // Initial Load
    document.addEventListener('DOMContentLoaded', renderShortcuts);
</script>
